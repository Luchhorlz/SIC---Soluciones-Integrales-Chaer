name: sic

services:
  postgres:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: sic
      POSTGRES_USER: sic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sic-development-only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sic -d sic"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-sic-development}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-sic-development-secret}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9001:9001"

  mailpit:
    image: axllent/mailpit:v1.29
    ports:
      - "127.0.0.1:8025:8025"

  api:
    build: ./apps/api
    volumes:
      - ./seeds:/app/seeds:ro
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://sic:${POSTGRES_PASSWORD:-sic-development-only}@postgres:5432/sic
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    build:
      context: ./apps
      dockerfile: worker/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  web:
    build: ./apps/web
    environment:
      API_INTERNAL_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  postgres_data:
  redis_data:
  minio_data:
